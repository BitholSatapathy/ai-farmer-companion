<!DOCTYPE html>
<html>
<head>
    <title>AI Farmer Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-success">🌾 AI Farmer Companion</h1>
    <p class="text-center">Enter soil and climate details to get crop recommendation</p>

    <div class="row justify-content-center mt-4">
        <div class="col-md-6">

            <form action="/predict" method="POST">

                <input type="number" name="N" class="form-control mb-3" placeholder="Nitrogen (N)" required>

                <input type="number" name="P" class="form-control mb-3" placeholder="Phosphorus (P)" required>

                <input type="number" name="K" class="form-control mb-3" placeholder="Potassium (K)" required>

                <input type="number" step="any" name="temperature" class="form-control mb-3" placeholder="Temperature (°C)" required>

                <input type="number" step="any" name="humidity" class="form-control mb-3" placeholder="Humidity (%)" required>

                <input type="number" step="any" name="ph" class="form-control mb-3" placeholder="pH Value" required>

                <input type="number" step="any" name="rainfall" class="form-control mb-3" placeholder="Rainfall (mm)" required>

                <button type="submit" class="btn btn-success w-100">
                    Predict Crop
                </button>

            </form>

            {% if prediction_text %}
            <div class="alert alert-success text-center mt-4">
                <h4>{{ prediction_text }}</h4>
            </div>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
