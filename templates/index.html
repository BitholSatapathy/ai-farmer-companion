<!DOCTYPE html>
<html>
<head>
    <title>AI Farmer Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container text-center mt-5">
        <h1 class="display-4 text-success">🌾 AI Farmer Companion</h1>
        <p class="lead">Your intelligent farming assistant powered by AI.</p>

        <div class="row mt-5">
            <div class="col-md-4">
                <div class="card shadow p-3">
                    <h5>🌱 Crop Recommendation</h5>
                    <p>Find the best crop based on soil and weather.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow p-3">
                    <h5>📷 Disease Detection</h5>
                    <p>Upload leaf image and detect plant diseases.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow p-3">
                    <h5>🌦 Weather Advisory</h5>
                    <p>Get farming advice based on weather data.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
